<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page">
        <div class="left">
            <div class="logo"></div>
            <div class="attribution">Photo by <a href="https://unsplash.com/@haliewestphoto?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Halie West</a> on <a href="https://unsplash.com/photos/green-leaf-plant-in-close-up-photography-25xggax4bSA?utm_source=unsplash&utm_medium=referral&utm_content=creditCopyText">Unsplash</a>
      </div>
        </div>
        <div class="right">
            <div class="top">
                <div class="long-quote">This is not a real online service! You know you need something like this in your life to help you realize your deepest dreams. Sign up <em>now</em> to get started. </div>
                <div class="short-quote">You <em>know</em> you want to.</div>
            </div>
            <form action="" id="form">
                <div class="form-text">Let's do this!</div>
                <div class="form-row">
                    <label for="first-name">First Name</label>
                    <input type="text" id="first-name">
                </div>
                <div class="form-row">
                    <label for="last-name">Last Name</label>
                    <input type="text" id="last-name">
                </div>
                <div class="form-row">
                    <label for="email">Email</label>
                    <input type="email" id="email">
                </div>
                <div class="form-row">
                    <label for="phone-number">Phone Number</label>
                    <input type="tel" id="phone-number">
                </div>
                <div class="form-row">
                    <label for="password">Password</label>
                    <input type="password" id="password" required>
                </div>
                <div class="form-row">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" required>
                </div>
            </form>
            <div class="bottom">
                <button type="submit" form="form">Create Account</button>
                <div class="login-text">Already have an account? <a href="login.com">Log in</a></div>
            </div>
        </div>
    </div>
</body>
</html>
